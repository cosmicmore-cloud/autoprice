<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SKT 아이폰17 전용 - ALGO</title>
    <style>
        :root { --main: #e60023; --bg: #f4f4f4; --blue: #0066ff; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .wrapper { max-width: 500px; margin: 0 auto; background: #fff; border-radius: 15px; overflow: hidden; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        .header { background: var(--main); color: #fff; padding: 18px; text-align: center; font-weight: bold; font-size: 19px; }
        .model-area { background: #333; padding: 12px; display: flex; gap: 8px; justify-content: center; }
        .m-btn { flex: 1; padding: 12px; border: 1px solid #555; background: #444; color: #bbb; border-radius: 8px; font-size: 14px; cursor: pointer; font-weight: bold; }
        .m-btn.active { background: #fff; color: #000; border-color: #fff; }
        .tab-row { display: flex; border-bottom: 1px solid #eee; }
        .tab { flex: 1; padding: 15px; border: none; background: #f9f9f9; cursor: pointer; font-weight: bold; color: #777; font-size: 14px; }
        .tab.active { background: #fff; color: var(--main); border-bottom: 3px solid var(--main); }
        .tab.sub-tab.active { color: var(--blue); border-bottom: 3px solid var(--blue); }
        .info-txt { padding: 20px 15px 5px; font-size: 16px; font-weight: bold; text-align: center; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 10px; }
        th { background: #f8f9fa; border-bottom: 2px solid #ddd; padding: 12px 5px; }
        td { border-bottom: 1px solid #eee; padding: 16px 5px; text-align: center; }
        .price-red { color: var(--main); font-weight: 900; font-size: 18px; }
        .apply-btn { display: block; margin: 20px; background: var(--main); color: #fff; text-align: center; padding: 18px; border-radius: 12px; text-decoration: none; font-weight: 900; font-size: 18px; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="header">SKT 아이폰 17 실시간 시세</div>
    <div class="model-area" id="model-btns"></div>
    <div class="tab-row">
        <button class="tab active" onclick="updateType('UP', this)">기기변경</button>
        <button class="tab" onclick="updateType('NP', this)">번호이동</button>
    </div>
    <div class="tab-row">
        <button class="tab sub-tab active" onclick="updateMode('gongsi', this)">공시지원금 할인</button>
        <button class="tab sub-tab" onclick="updateMode('sanyak', this)">선택약정 25% 할인</button>
    </div>
    <div class="info-txt"><span id="m-name">데이터 불러오는 중...</span><br><small id="m-price">-</small></div>
    <table>
        <thead id="t-head"></thead>
        <tbody id="t-body"></tbody>
    </table>
    <a href="https://tgateplus.sktelecom.com/main/main.do?p=6371dc04db9e9108349ee5afbcd9035ff0a1d17d57981a8712987187a501a69b" class="apply-btn">📄 아이폰 17 즉시 개통하기</a>
</div>

<script>
const SHEET_URL = `https://docs.google.com/spreadsheets/d/1BLu38wjfsMwRk9wp5jnlE-3mlqb-_mZzp0i-Z_fdoXw/gviz/tq?tqx=out:csv`;

const PLANS = [ 
    {name:"5GX 프리미엄", price:109000}, 
    {name:"5GX 프라임+", price:99000}, 
    {name:"5GX 프라임", price:89000}, 
    {name:"5GX 레귤러+", price:79000} 
];

let DEVICES = []; let cur = null; let type = 'UP'; let mode = 'gongsi';

async function loadData() {
    try {
        const res = await fetch(SHEET_URL);
        const text = await res.text();
        const rows = text.split('\n').map(r => r.replace(/"/g, '').split(','));
        
        // [핵심 수정] 이름에 "17"이 들어가면서 "256" 또는 "512"가 포함된 것만 필터링
        DEVICES = rows.filter(cols => {
            const name = cols[0] || "";
            return name.includes("17") && (name.includes("256") || name.includes("512"));
        }).map(cols => ({
            name: cols[0],
            price: parseInt(cols[7]) || 0,
            gongsi: parseInt(cols[9]) || 0,
            NP: parseInt(cols[1]) || 0,
            UP: parseInt(cols[2]) || 0
        }));

        if(DEVICES.length > 0) {
            cur = DEVICES[0];
            renderButtons();
            render();
        } else {
            document.getElementById('m-name').innerText = "아이폰 17 (256/512G) 데이터를 찾을 수 없습니다.";
        }
    } catch (e) {
        document.getElementById('m-name').innerText = "연결 오류";
    }
}

function renderButtons() {
    const area = document.getElementById('model-btns');
    area.innerHTML = "";
    DEVICES.forEach(d => {
        const btn = document.createElement('button');
        btn.className = `m-btn ${d === cur ? 'active' : ''}`;
        btn.innerText = d.name.replace("iPhone 17 ", ""); // 이름에서 중복되는 부분 제거하고 용량만 표시
        btn.onclick = () => { 
            cur = d;
            document.querySelectorAll('.m-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            render(); 
        };
        area.appendChild(btn);
    });
}

function updateType(t, b) { type = t; selectTab(b); render(); }
function updateMode(m, b) { mode = m; selectTab(b); render(); }
function selectTab(b) { b.parentNode.querySelectorAll('.tab').forEach(x=>x.classList.remove('active')); b.classList.add('active'); }

function render() {
    if(!cur) return;
    document.getElementById('m-name').innerText = cur.name;
    document.getElementById('m-price').innerText = `출고가: ${cur.price.toLocaleString()}원`;
    
    const head = document.getElementById('t-head');
    const body = document.getElementById('t-body');
    body.innerHTML = "";

    const algoSupport = (cur[type] || 0) * 10000;

    if (mode === 'gongsi') {
        head.innerHTML = `<tr><th>요금제</th><th>지원합계</th><th>할부원금</th><th style="background:#fffafa">월 납부액</th></tr>`;
        PLANS.forEach(p => {
            const totalSupp = cur.gongsi + algoSupport;
            const principal = Math.max(0, cur.price - totalSupp);
            const monthly = Math.floor((principal * 1.059) / 24 / 10) * 10 + p.price;
            body.innerHTML += `<tr><td><b>${p.name}</b></td><td>${totalSupp.toLocaleString()}</td><td>${principal.toLocaleString()}</td><td class="price-red">${monthly.toLocaleString()}원</td></tr>`;
        });
    } else {
        head.innerHTML = `<tr><th>요금제</th><th>25% 할인</th><th>할부원금</th><th style="background:#fffafa">월 납부액</th></tr>`;
        PLANS.forEach(p => {
            const principal = Math.max(0, cur.price - algoSupport);
            const monthly = Math.floor((principal * 1.059) / 24 / 10) * 10 + (p.price * 0.75);
            body.innerHTML += `<tr><td><b>${p.name}</b></td><td style="color:green">-${(p.price*0.25).toLocaleString()}</td><td>${principal.toLocaleString()}</td><td class="price-red">${monthly.toLocaleString()}원</td></tr>`;
        });
    }
}

loadData();
</script>
</body>
</html>
