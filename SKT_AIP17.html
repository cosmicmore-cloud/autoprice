<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SKT 아이폰17 시세 - ALGO</title>
    <style>
        :root { --main: #e60023; --bg: #f4f4f4; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .wrapper { max-width: 500px; margin: 0 auto; background: #fff; border-radius: 15px; overflow: hidden; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        .header { background: var(--main); color: #fff; padding: 18px; text-align: center; font-weight: bold; font-size: 19px; }
        .model-area { background: #333; padding: 12px; display: flex; gap: 8px; justify-content: center; }
        .m-btn { flex: 1; padding: 12px; border: 1px solid #555; background: #444; color: #bbb; border-radius: 8px; font-size: 14px; cursor: pointer; font-weight: bold; }
        .m-btn.active { background: #fff; color: #000; border-color: #fff; }
        .tab-row { display: flex; border-bottom: 1px solid #eee; }
        .tab { flex: 1; padding: 15px; border: none; background: #f9f9f9; cursor: pointer; font-weight: bold; color: #777; font-size: 14px; }
        .tab.active { background: #fff; color: var(--main); border-bottom: 3px solid var(--main); }
        .info-txt { padding: 20px 15px 5px; font-size: 16px; font-weight: bold; text-align: center; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 10px; }
        th { background: #f8f9fa; border-bottom: 2px solid #ddd; padding: 12px 5px; }
        td { border-bottom: 1px solid #eee; padding: 16px 5px; text-align: center; }
        .price-red { color: var(--main); font-weight: 900; font-size: 18px; }
        .apply-btn { display: block; margin: 20px; background: var(--main); color: #fff; text-align: center; padding: 18px; border-radius: 12px; text-decoration: none; font-weight: 900; font-size: 18px; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="header">SKT 아이폰 17 실시간 시세</div>
    <div class="model-area" id="model-btns"></div>
    <div class="tab-row">
        <button class="tab active" onclick="updateType('UP', this)">기기변경</button>
        <button class="tab" onclick="updateType('NP', this)">번호이동</button>
    </div>
    <div class="tab-row">
        <button class="tab active" style="width:100%; border-bottom: 3px solid #0066ff; color:#0066ff;">공시지원금 할인 기준</button>
    </div>
    <div class="info-txt"><span id="m-name">조회 중...</span><br><small id="m-price">-</small></div>
    <table>
        <thead><tr><th>요금제</th><th>지원합계</th><th>할부원금</th><th style="background:#fffafa">월 납부액</th></tr></thead>
        <tbody id="t-body"></tbody>
    </table>
    <a href="https://tgateplus.sktelecom.com/main/main.do?p=6371dc04db9e9108349ee5afbcd9035ff0a1d17d57981a8712987187a501a69b" class="apply-btn">📄 아이폰 17 즉시 개통하기</a>
</div>

<script>
const SHEET_URL = `https://docs.google.com/spreadsheets/d/1BLu38wjfsMwRk9wp5jnlE-3mlqb-_mZzp0i-Z_fdoXw/gviz/tq?tqx=out:csv`;

const PLANS = [ 
    {name:"5GX 프리미엄", price:109000}, 
    {name:"5GX 프라임+", price:99000}, 
    {name:"5GX 프라임", price:89000}, 
    {name:"5GX 레귤러+", price:79000} 
];

let DEVICES = []; let cur = null; let type = 'UP';

async function loadData() {
    try {
        const res = await fetch(SHEET_URL);
        const text = await res.text();
        // 쉼표로 분리하되, 따옴표 안의 쉼표는 무시하도록 처리
        const rows = text.split('\n').map(row => row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g) || []);
        
        DEVICES = rows.filter(cols => {
            const name = (cols[0] || "").replace(/"/g, "");
            return name.includes("17") && (name.includes("256") || name.includes("512"));
        }).map(cols => {
            // 숫자가 아닌 문자 제거 후 정수 변환
            const clean = (val) => parseInt((val || "0").replace(/[^0-9]/g, "")) || 0;
            return {
                name: cols[0].replace(/"/g, ""),
                price: clean(cols[7]),   // H열 출고가
                gongsi: clean(cols[9]),  // J열 공시지원금
                NP: clean(cols[1]),      // B열 번이 지원금
                UP: clean(cols[2])       // C열 기변 지원금
            };
        });

        if(DEVICES.length > 0) {
            cur = DEVICES[0];
            renderButtons();
            render();
        }
    } catch (e) { console.error(e); }
}

function renderButtons() {
    const area = document.getElementById('model-btns');
    area.innerHTML = "";
    DEVICES.forEach(d => {
        const btn = document.createElement('button');
        btn.className = `m-btn ${d === cur ? 'active' : ''}`;
        btn.innerText = d.name.includes("256") ? "256G" : "512G";
        btn.onclick = () => { cur = d; renderButtons(); render(); };
        area.appendChild(btn);
    });
}

function updateType(t, b) { 
    type = t; 
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active')); 
    b.classList.add('active'); 
    render(); 
}

function render() {
    if(!cur) return;
    document.getElementById('m-name').innerText = cur.name;
    document.getElementById('m-price').innerText = `출고가: ${cur.price.toLocaleString()}원`;
    
    const body = document.getElementById('t-body');
    body.innerHTML = "";

    const algoSupport = cur[type] * 10000; // 사장님 지원금 (단위: 만원)
    const totalSupp = cur.gongsi + algoSupport; // 공시 + 사장님 지원금

    PLANS.forEach(p => {
        const principal = Math.max(0, cur.price - totalSupp); // 할부원금 = 출고가 - 지원합계
        const monthlyInstallment = Math.floor((principal * 1.059) / 24 / 10) * 10; // 24개월 할부 (이자 5.9%)
        const totalMonthly = monthlyInstallment + p.price; // 월 납부액 = 할부금 + 요금제

        body.innerHTML += `
            <tr>
                <td><b>${p.name}</b></td>
                <td>${totalSupp.toLocaleString()}</td>
                <td>${principal.toLocaleString()}</td>
                <td class="price-red">${totalMonthly.toLocaleString()}원</td>
            </tr>`;
    });
}

loadData();
</script>
</body>
</html>
