<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SKT 자동계산 - ALGO</title>
    <style>
        :root { --main: #e60023; --bg: #f4f4f4; --blue: #0066ff; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .wrapper { max-width: 500px; margin: 0 auto; background: #fff; border-radius: 15px; overflow: hidden; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        .header { background: var(--main); color: #fff; padding: 18px; text-align: center; font-weight: bold; font-size: 19px; }
        .model-area { background: #333; padding: 10px; display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; }
        .model-area::-webkit-scrollbar { display: none; }
        .m-btn { padding: 9px 14px; border: 1px solid #555; background: #444; color: #bbb; border-radius: 8px; font-size: 13px; cursor: pointer; white-space: nowrap; }
        .m-btn.active { background: #fff; color: #000; font-weight: bold; border-color: #fff; }
        .tab-row { display: flex; border-bottom: 1px solid #eee; }
        .tab { flex: 1; padding: 14px; border: none; background: #f9f9f9; cursor: pointer; font-weight: bold; color: #777; font-size: 14px; }
        .tab.active { background: #fff; color: var(--main); border-bottom: 3px solid var(--main); }
        .tab.sub-tab.active { color: var(--blue); border-bottom: 3px solid var(--blue); }
        .info-txt { padding: 15px 15px 5px; font-size: 15px; font-weight: bold; min-height: 55px; }
        .info-txt small { color: #888; font-weight: normal; font-size: 12px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 10px; }
        th { background: #f8f9fa; border-bottom: 2px solid #ddd; padding: 12px 5px; }
        td { border-bottom: 1px solid #eee; padding: 15px 5px; text-align: center; line-height: 1.4; }
        .price-red { color: var(--main); font-weight: 900; font-size: 17px; }
        .highlight { background: #fffafa; }
        .apply-btn { display: block; margin: 20px; background: var(--main); color: #fff; text-align: center; padding: 16px; border-radius: 12px; text-decoration: none; font-weight: 900; font-size: 18px; cursor: pointer; border: none; width: calc(100% - 40px); }
    </style>
</head>
<body>
<div class="wrapper">
    <div class="header">SKT [ALGO]</div>
    <div class="model-area" id="model-btns"></div>
    <div class="tab-row">
        <button class="tab active" onclick="setType('UP', this)">기기변경</button>
        <button class="tab" onclick="setType('NP', this)">번호이동</button>
    </div>
    <div class="tab-row">
        <button class="tab sub-tab active" onclick="setMode('gongsi', this)">공시지원금 할인</button>
        <button class="tab sub-tab" onclick="setMode('sanyak', this)">선택약정 25% 할인</button>
    </div>
    <div class="info-txt" id="display-info">아이폰17 데이터 로딩 중...</div>
    <table>
        <thead><tr id="tableHead"></tr></thead>
        <tbody id="tableBody"></tbody>
    </table>
    <button id="final-link" class="apply-btn" onclick="openLink()">📄 공식 신청서 작성하기</button>
</div>

<script>
// 사장님 시트 skt_price 탭 전용 주소
const SHEET_URL = `https://docs.google.com/spreadsheets/d/1BLu38wjfsMwRk9wp5jnlE-3mlqb-_mZzp0i-Z_fdoXw/gviz/tq?tqx=out:csv&sheet=skt_price`;
const PLANS = [ {n:"5GX 프리미엄", p:109000}, {n:"5GX 프라임+", p:99000}, {n:"5GX 프라임", p:89000}, {n:"5GX 레귤러+", p:79000} ];

let DEVICES = []; let curDev = null; let curType = 'UP'; let curMode = 'gongsi';

async function init() {
    try {
        const res = await fetch(SHEET_URL);
        const text = await res.text();
        const rows = text.split('\n').filter(r => r.trim() !== "").map(row => {
            const matches = row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g);
            return matches ? matches.map(cell => cell.replace(/"/g, '').trim()) : [];
        });

        // 아이폰17 256G / 512G 데이터를 정확히 파싱
        DEVICES = rows.slice(1).map(cols => {
            const parseN = (v) => parseInt(String(v || "0").replace(/[^0-9]/g, "")) || 0;
            const parseS = (s) => (s || "0,0,0,0").split(',').map(v => parseN(v) * 10000);
            return {
                name: cols[0],       // A: 기종명 (아이폰17 256G 등)
                price: parseN(cols[1]),   // B: 출고가
                extra: parseN(cols[2]),   // C: 추가지원금
                UP: parseS(cols[3]),      // D: SK기변 (쉼표로 구분된 4개 숫자)
                NP: parseS(cols[4]),      // E: SK번이 (쉼표로 구분된 4개 숫자)
                url: cols[9] || ""        // J: 신청서URL
            };
        }).filter(d => d.name && d.price > 0);

        const area = document.getElementById('model-btns');
        area.innerHTML = "";
        DEVICES.forEach((d, i) => {
            const btn = document.createElement('button');
            btn.className = `m-btn ${i===0?'active':''}`; btn.innerText = d.name;
            btn.onclick = function() { 
                document.querySelectorAll('.m-btn').forEach(x=>x.classList.remove('active')); 
                this.classList.add('active'); curDev = d; render(); 
            };
            area.appendChild(btn);
        });

        if(DEVICES.length > 0) { curDev = DEVICES[0]; render(); }
    } catch (e) { document.getElementById('display-info').innerText = "시트 연결 오류"; }
}

function setType(t, b) { curType = t; b.parentNode.querySelectorAll('.tab').forEach(x=>x.classList.remove('active')); b.classList.add('active'); render(); }
function setMode(m, b) { curMode = m; b.parentNode.querySelectorAll('.tab').forEach(x=>x.classList.remove('active')); b.classList.add('active'); render(); }

function render() {
    if(!curDev) return;
    
    // 출고가 및 기종명 표시 업데이트
    document.getElementById('display-info').innerHTML = `<span>${curDev.name}</span><br><small>정상출고가: ${curDev.price.toLocaleString()}원 (${curType==='UP'?'기변':'번이'})</small>`;

    const head = document.getElementById('tableHead'); const body = document.getElementById('tableBody'); body.innerHTML = "";
    
    if (curMode === 'gongsi') {
        head.innerHTML = `<th>요금제</th><th>지원합계</th><th>할부원금</th><th class="highlight">월 납부액</th>`;
        PLANS.forEach((p, i) => {
            const totalS = (curDev[curType][i] || 0) + curDev.extra;
            const princ = Math.max(0, curDev.price - totalS);
            const pay = Math.floor((princ * 1.059) / 24 / 10) * 10 + p.p;
            body.innerHTML += `<tr><td><b>${p.n}</b><br><small>${p.p.toLocaleString()}원</small></td><td>${totalS.toLocaleString()}</td><td>${princ.toLocaleString()}</td><td class="price-red highlight">${pay.toLocaleString()}원</td></tr>`;
        });
    } else {
        head.innerHTML = `<th>요금제</th><th>25% 할인</th><th>할부원금</th><th class="highlight">월 납부액</th>`;
        PLANS.forEach((p, i) => {
            const princ = Math.max(0, curDev.price - (curDev[curType][i] || 0));
            const pay = Math.floor((princ * 1.059) / 24 / 10) * 10 + (p.p * 0.75);
            body.innerHTML += `<tr><td><b>${p.n}</b><br><small>${p.p.toLocaleString()}원</small></td><td style="color:green">-${(p.p*0.25).toLocaleString()}</td><td>${princ.toLocaleString()}</td><td class="price-red highlight">${pay.toLocaleString()}원</td></tr>`;
        });
    }
}

function openLink() {
    if(!curDev || !curDev.url || curDev.url.length < 5) { alert("신청서 링크가 등록되지 않았습니다."); return; }
    window.open(curDev.url, '_blank');
}
init();
</script>
</body>
</html>
